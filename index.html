<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primbon Jawa Premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }
</style>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen">

<!-- HEADER -->
<header class="text-center py-6 border-b border-gray-800 backdrop-blur">
  <img src="logo.png"
       class="w-16 h-16 mx-auto mb-2 rounded-full object-cover shadow-lg">
  <h1 class="text-xl font-semibold tracking-wide">Primbon Jawa</h1>
  <p class="text-sm text-gray-400">Ramalan Tradisional Modern</p>
</header>

<div class="max-w-2xl mx-auto px-4 py-6">

  <!-- ARTIKEL -->
  <div class="bg-white/5 backdrop-blur-xl p-5 rounded-2xl border border-white/10 mb-6">
    <h2 class="text-lg font-semibold mb-2">Tentang Primbon</h2>
    <p class="text-sm text-gray-300 leading-relaxed">
      Primbon Jawa adalah warisan budaya yang digunakan untuk membaca karakter,
      asmara, dan rezeki berdasarkan weton kelahiran. Digunakan sebagai panduan hidup
      oleh masyarakat Jawa sejak dahulu.
    </p>
  </div>

  <!-- FORM -->
  <div class="bg-white/5 backdrop-blur-xl p-5 rounded-2xl border border-white/10">

    <h2 class="text-lg font-semibold mb-3 text-center">Cek Ramalan Anda</h2>

    <input type="text" id="tgl"
      placeholder="Contoh: 17-08-1995"
      class="w-full p-3 rounded-xl bg-black/40 border border-gray-700 text-white mb-3 outline-none focus:border-purple-500">

    <button onclick="hitung()"
      <button onclick="hitung()"
  class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 p-3 rounded-xl font-semibold flex items-center justify-center gap-2 hover:scale-105 transition">

  <img src="icon.png" class="w-5 h-5 object-contain">
  Lihat Ramalan

</button>
    </button>

  </div>

  <!-- HASIL -->
  <div id="hasil" class="mt-6 space-y-4"></div>

</div>

<!-- FOOTER -->
<footer class="text-center text-xs text-gray-500 py-5 border-t border-gray-800">
  © 2026 OkyRaya • Primbon Premium
</footer>

<script>
function hitung(){
  let input = document.getElementById("tgl").value;

  if(!input){
    alert("Masukkan tanggal dulu!");
    return;
  }

  let parts = input.split("-");
  if(parts.length !== 3){
    alert("Format harus DD-MM-YYYY");
    return;
  }

  let tgl = new Date(parts[2], parts[1]-1, parts[0]);

  const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const pasaran = ["Legi","Pahing","kliwon","Wage","pon"];

  let h = hari[tgl.getDay()];
  let p = pasaran[tgl.getDate() % 5];

  let neptuHari = {Minggu:5, Senin:4, Selasa:3, Rabu:7, Kamis:8, Jumat:6, Sabtu:9};
  let neptuPasaran = {Legi:5, Pahing:9, Pon:7, Wage:4, Kliwon:8};

  let total = neptuHari[h] + neptuPasaran[p];

  let sifat="", asmara="", karir="";

  if(total <= 10){
    sifat = "Tenang, sabar, dan cenderung pendiam.";
    asmara = "Setia namun sulit mengungkapkan perasaan.";
    karir = "Cocok di pekerjaan stabil dan terstruktur.";
  }
  else if(total <= 15){
    sifat = "Pekerja keras dan bertanggung jawab.";
    asmara = "Romantis dan serius dalam hubungan.";
    karir = "Potensi sukses di bisnis atau kerja lapangan.";
  }
  else{
    sifat = "Pemimpin, berani, dan tegas.";
    asmara = "Dominan dalam hubungan, perlu keseimbangan.";
    karir = "Cocok jadi pemimpin atau pengusaha.";
  }

  document.getElementById("hasil").innerHTML = `
    
    <!-- CARD INFO -->
    <div class="bg-white/5 p-4 rounded-xl border border-white/10">
      <div class="grid grid-cols-3 gap-3 text-center text-sm">
        <div>
          <div class="text-gray-400">Hari</div>
          <div class="font-semibold">${h}</div>
        </div>
        <div>
          <div class="text-gray-400">Pasaran</div>
          <div class="font-semibold">${p}</div>
        </div>
        <div>
          <div class="text-gray-400">Neptu</div>
          <div class="font-semibold text-purple-400">${total}</div>
        </div>
      </div>
    </div>

    <!-- SIFAT -->
    <div class="bg-white/5 p-4 rounded-xl border border-white/10">
      <h3 class="font-semibold mb-1 text-purple-400">Sifat</h3>
      <p class="text-sm text-gray-300">${sifat}</p>
    </div>

    <!-- ASMARA -->
    <div class="bg-white/5 p-4 rounded-xl border border-white/10">
      <h3 class="font-semibold mb-1 text-pink-400">Asmara</h3>
      <p class="text-sm text-gray-300">${asmara}</p>
    </div>

    <!-- KARIR -->
    <div class="bg-white/5 p-4 rounded-xl border border-white/10">
      <h3 class="font-semibold mb-1 text-yellow-400">Karier</h3>
      <p class="text-sm text-gray-300">${karir}</p>
    </div>

  `;
}
</script>

</body>
</html>
